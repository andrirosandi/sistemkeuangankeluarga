services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: skk_app
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:80"
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - APP_ENV=production
      - APP_DEBUG=false
    env_file:
      - ../.env
    volumes:
      - app-storage:/app/storage/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - rsndi_network

  db:
    image: mysql:8.0
    container_name: skk_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    env_file:
      - ../.env
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rsndi_network

volumes:
  db-data:
  app-storage:

networks:
  rsndi_network:
    name: ${DOCKER_NETWORK:-rsndi_nevacloud}
    external: true
