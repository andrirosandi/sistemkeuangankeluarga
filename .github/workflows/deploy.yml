name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Executing Deployment Scripts via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_DIR: "/srv/sistemkeuangankeluarga"
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          envs: APP_DIR
          script: |
            cd $APP_DIR

            # Tarik kode terbaru dari GitHub
            git fetch origin main
            git reset --hard origin/main

            # Copy docker config dari folder docker/ ke root project
            cp docker/docker-compose.yml docker-compose.yml
            cp docker/Dockerfile Dockerfile

            # Restart docker (tanpa build, code di-mount dari host)
            docker compose down
            docker compose up -d

            # Tunggu container ready
            sleep 10

            # Install composer dependencies di dalam container
            docker exec skk_app composer install --no-dev --optimize-autoloader --no-interaction

            # Build frontend assets - SUDAH DI-TRACK DI REPO (/public/build)
            # docker exec skk_app npm install
            # docker exec skk_app npm run build

            # Jalankan migrasi database otomatis jika ada tabel baru
            docker exec skk_app php artisan migrate --force

            # Optimasi cache framework laravel
            docker exec skk_app php artisan optimize:clear
            docker exec skk_app php artisan view:cache
            docker exec skk_app php artisan config:cache

            # Pastikan storage link dibuat
            docker exec skk_app php artisan storage:link

            # Bersihkan cache untuk hemat disk
            docker exec skk_app php artisan cache:clear

            echo "Deployment Selesai!"
