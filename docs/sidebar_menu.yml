menu:
  - label: "Dashboard"
    icon: "home"
    route: "dashboard"
    permission: "dashboard.view"

  - label: "Kas Masuk"
    icon: "trending-down"
    children:
      - label: "Pengajuan"
        route: "in.request.index"
        permission: "in.request.view"
      - label: "Realisasi"
        route: "in.transaction.index"
        permission: "in.transaction.view"

  - label: "Kas Keluar"
    icon: "trending-up"
    children:
      - label: "Pengajuan"
        route: "out.request.index"
        permission: "out.request.view"
      - label: "Realisasi"
        route: "out.transaction.index"
        permission: "out.transaction.view"

  - label: "Mutasi"
    icon: "transfer"
    route: "mutation.index"
    permission: "mutation.view"

  - label: "Laporan & Analitik"
    icon: "report-analytics"
    route: "report.index"
    permission: "report.view.self"
    # User dengan report.view.self bisa akses (data sendiri)
    # Admin dengan report.view bisa akses semua + export

  - label: "Master Data & Pengaturan"
    icon: "settings"
    permission: "category.view"
    children:
      - label: "Kategori Kas"
        route: "master.categories.index"
        permission: "category.view"
      - label: "Template Rutin"
        route: "master.templates.index"
        permission: "template.view"
      - label: "Manajemen Pengguna"
        route: "master.users.index"
        permission: "user.view"
      - label: "Group & Akses"
        route: "master.roles.index"
        permission: "role.view"
      - label: "Pengaturan Sistem"
        route: "settings.index"
        permission: "setting.view"

navbar:
  - label: "Notifikasi"
    icon: "bell"
    route: "notification.index"
    badge: "unread_count"
    permission: "notification.view"

  - label: "Profile Menu"
    icon: "user-circle"
    children:
      - label: "Profile Settings"
        route: "profile.edit"
      - label: "Logout"
        route: "logout"
