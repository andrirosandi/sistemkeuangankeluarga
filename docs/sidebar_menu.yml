menu:
  - label: "Dashboard"
    icon: "home"
    route: "dashboard"
    roles: ["admin", "user"]

  - label: "Kas Masuk"
    icon: "trending-down"
    children:
      - label: "Pengajuan"
        route: "in.request.index"
        roles: ["admin", "user"]
      - label: "Pending Approval"
        route: "in.approval.index"
        badge: "pending_in_count" # Muncul angka jika ada antrean IN
        roles: ["admin"]
      - label: "Buku Mutasi"
        route: "in.transaction.index"
        roles: ["admin"]

  - label: "Kas Keluar"
    icon: "trending-up"
    children:
      - label: "Pengajuan"
        route: "out.request.index"
        roles: ["admin", "user"]
      - label: "Pending Approval"
        route: "out.approval.index"
        badge: "pending_out_count" # Muncul angka jika ada antrean OUT
        roles: ["admin"]
      - label: "Buku Mutasi"
        route: "out.transaction.index"
        roles: ["admin"]

  - label: "Laporan & Analitik"
    icon: "report-analytics"
    route: "report.index"
    roles: ["admin"]

  - label: "Master Data & Pengaturan"
    icon: "settings"
    roles: ["admin"]
    children:
      - label: "Kategori Kas"
        route: "master.category.index"
      - label: "Template Rutin"
        route: "master.template.index"
      - label: "Manajemen Pengguna"
        route: "master.user.index"
      - label: "Group & Akses"
        route: "master.group.index"
      - label: "Pengaturan Sistem"
        route: "settings.index"

navbar:
  - label: "Notifikasi"
    icon: "bell"
    route: "notification.index"
    badge: "unread_count" # Muncul titik merah kalau ada yang unread
    roles: ["admin", "user"]

  - label: "Profile Menu"
    icon: "user-circle" # Berisi Avatar & Nama
    roles: ["admin", "user"]
    children:
      - label: "Profile Settings"
        route: "profile.edit"
      - label: "Logout"
        route: "logout"
